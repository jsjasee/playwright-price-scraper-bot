name: Check Price

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *" # schedules the workflow to run everyday at 9am singapore time, which is 1am utc
    # 0 1 * * * is cron format: minute hour day-of-month month day-of-week

jobs:
  check-price:
    runs-on: ubuntu-latest

    env:
      FAIRPRICE_PRODUCT_URL: ${{ secrets.FAIRPRICE_PRODUCT_URL }}
      PRICE_THRESHOLD: "3.00"
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run price check
        run: npx tsx src/priceText.ts
